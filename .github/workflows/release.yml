name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Build release archive
        run: ./script/make_release.sh "${GITHUB_REF_NAME}"
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/releases/KClip-${{ github.ref_name }}-macOS.zip
          generate_release_notes: true
